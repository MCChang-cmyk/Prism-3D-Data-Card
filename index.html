<!DOCTYPE html>
<html>
<head>
    <style>
        body { background-color: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #card-container { 
            width: 500px; 
            height: 500px; 
            border: 2px solid #1e293b; 
            background: #020617;
            position: relative;
        }
    </style>
</head>
<body>
    <div id="card-container"></div>
    
    <script type="module" src="./prism-3d-card.js"></script>

    <script type="module">
customElements.whenDefined('prism-3d-card').then(() => {
    const container = document.getElementById('card-container');
    const card = document.createElement('prism-3d-card');
    
    // 在這裡測試不同的屬性！
    card.setConfig({
        height: "500px",
        mode: "3d",           // 測試：改為 "2d" 看看差別
        color: "#E13460",     // 測試：改為 "#ff9800" (橘色) 或 "#e91e63" (粉色)
        radius: "80%",        // 測試：調整大小看會不會爆板
        entities: [
            { entity: 's1', name: '九層塔', max: 100 },
            { entity: 's2', name: '龜背芋', max: 100 },
            { entity: 's3', name: '鹿角蕨', max: 100 },
            { entity: 's4', name: '濕度', max: 100 },
            { entity: 's5', name: '光照', max: 100 }
        ]
    });
    
    // 模擬數據
    card.hass = {
        states: {
            's1': { state: '85' },
            's2': { state: '60' },
            's3': { state: '45' },
            's4': { state: '70' },
            's5': { state: '30' }
        }
    };
    
    container.appendChild(card);
});
    </script>
</body>
</html>
